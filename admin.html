<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FOT-M | Yönetim Paneli</title>
    <script>
        const giris = prompt("Yönetici Şifresi:");
        if(giris !== "FOTM2026") {
            document.write("<body style='background:#050505; color:white; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;'><h2>Erişim Engellendi</h2></body>");
            window.stop();
        }
    </script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 380px; background: #111; padding: 40px; border-right: 1px solid #222; overflow-y: auto; }
        h2 { font-size: 22px; margin-bottom: 20px; letter-spacing: 1px; }
        label { font-size: 12px; color: #a1a1aa; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #ccc; }
        .content { flex: 1; padding: 40px; background: #0a0a0a; overflow-y: auto; }
        .haber-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .haber-card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; position: relative; }
        .btn-delete { background: #4a0000; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>FOT-M Panel</h2>
        <label>Kategori</label>
        <input type="text" id="etiket" placeholder="Örn: Duyuru, Ar-Ge">
        <label>Haber Başlığı</label>
        <input type="text" id="baslik" required>
        <label>İçerik Metni</label>
        <textarea id="metin" rows="6" required></textarea>
        <label>Görsel</label>
        <input type="file" id="gorsel" accept="image/*">
        <button class="btn-submit" id="saveBtn" onclick="yayinla()">YAYINLA</button>
    </div>
    <div class="content">
        <h3>Yayındaki İçerikler</h3>
        <div class="haber-grid" id="liste"></div>
    </div>

    <script>
        const S_URL = "https://tzdpljzkzvejdaydcwwi.supabase.co/rest/v1/duyurular";
        const S_KEY = "BURAYA_ANON_KEY_GELECEK"; 

        const headers = { "apikey": S_KEY, "Authorization": `Bearer ${S_KEY}`, "Content-Type": "application/json" };

        window.onload = listele;

        async function yayinla() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "YÜKLENİYOR...";
            btn.disabled = true;

            const file = document.getElementById('gorsel').files[0];
            let base64 = "";
            if(file) {
                const reader = new FileReader();
                base64 = await new Promise(r => { reader.onload=()=>r(reader.result); reader.readAsDataURL(file); });
            }

            const veri = {
                etiket: document.getElementById('etiket').value,
                baslik: document.getElementById('baslik').value,
                metin: document.getElementById('metin').value,
                gorsel: base64
            };

            await fetch(S_URL, { method: 'POST', headers, body: JSON.stringify(veri) });
            alert("Başarıyla eklendi!");
            location.reload();
        }

        async function listele() {
            const res = await fetch(`${S_URL}?select=*&order=id.desc`, { headers });
            const data = await res.json();
            const div = document.getElementById('liste');
            div.innerHTML = data.length ? '' : '<p style="color:#444;">Duyuru yok.</p>';
            data.forEach(d => {
                div.innerHTML += `<div class="haber-card">
                    ${d.gorsel ? `<img src="${d.gorsel}" style="width:100%; border-radius:4px; margin-bottom:10px;">` : ''}
                    <small style="color:#666;">${d.etiket}</small>
                    <h4 style="margin:5px 0;">${d.baslik}</h4>
                    <button class="btn-delete" onclick="sil(${d.id})">SİL</button>
                </div>`;
            });
        }

        async function sil(id) {
            if(confirm("Silinsin mi?")) {
                await fetch(`${S_URL}?id=eq.${id}`, { method: 'DELETE', headers });
                listele();
            }
        }
    </script>
</body>
</html>
